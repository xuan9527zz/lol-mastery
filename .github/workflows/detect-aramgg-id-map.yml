name: Detect aramgg augment id mapping once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-aramgg-id-map:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Detect all aramgg augment id mappings
        run: node scripts/detect-aramgg-id-map.js

      - name: Commit generated diagnostic data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/aramgg-id-map-detection.json
          git commit -m "Update full aramgg id mapping detection output" || echo "No changes to commit"
          git push
