name: Scrape aramgg augment dictionary once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-augment-dictionary:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Scrape aramgg augment dictionary
        run: node scripts/scrape-aramgg-augment-dictionary.js

      - name: Commit generated augment dictionary
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/aramgg-augment-dictionary.json
          git commit -m "Add aramgg augment dictionary snapshot" || echo "No changes to commit"
          git push
