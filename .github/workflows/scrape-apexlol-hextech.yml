name: Scrape ApexLoL hextech dictionary once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-apexlol-hextech:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Scrape ApexLoL hextech dictionary
        run: node scripts/scrape-apexlol-hextech.js

      - name: Commit generated ApexLoL dictionary
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/apexlol-hextech-dictionary.json
          git commit -m "Add ApexLoL hextech dictionary snapshot" || echo "No changes to commit"
          git push
